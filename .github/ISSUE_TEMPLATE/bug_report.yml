name: Bug Report
description: Runtime failure, panic, wrong output, or build failure
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **ROCm-Oxide is experimental software. APIs and generated bindings may change between releases.**
        Please include the full `cargo rocm-oxide doctor` output below — it generates a copy-pasteable block automatically.

  - type: textarea
    id: doctor_output
    attributes:
      label: Doctor output
      description: Run `cargo rocm-oxide doctor` and paste the full output here (including the GitHub issue block at the end).
      placeholder: |
        [PASS] cargo ...
        [PASS] rustc channel: nightly
        ...
        --- rocm-oxide doctor ---
        ...
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact command that failed
      description: The full command you ran, including any environment variables.
      placeholder: "cargo run --example hello_gpu_rust"
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Full terminal output
      description: Paste the complete terminal output, including any error messages.
      render: text
    validations:
      required: true

  - type: input
    id: rocm_version
    attributes:
      label: ROCm version
      description: "`cat /opt/rocm/.info/version` or `rocminfo | head -5`"
      placeholder: "7.2.53211-364a905"
    validations:
      required: true

  - type: input
    id: gpu_arch
    attributes:
      label: GPU architecture
      description: "`rocminfo | grep 'gfx'` or the arch shown by `cargo rocm-oxide doctor`"
      placeholder: "gfx1100"
    validations:
      required: true

  - type: input
    id: rust_toolchain
    attributes:
      label: Rust toolchain
      description: "`rustc --version`"
      placeholder: "rustc 1.80.0-nightly (abc123) 2026-05-01"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else relevant — custom ROCm paths, unusual hardware, recent system changes.
